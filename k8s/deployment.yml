apiVersion: apps/v1
kind: Deployment
metadata:
  # Имя твоего приложения в кластере
  name: my-app-deployment
  labels:
    app: my-app
spec:
  # Сколько копий (подов) запустить одновременно
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app-container
        # Теперь здесь обычный текст, который поймет команда 'sed' в GitHub Actions
        image: snegzok/my-app:latest
        ports:
        - containerPort: 5000 # Порт, на котором работает твой app.py
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"

---
# Сервис для доступа к приложению
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
