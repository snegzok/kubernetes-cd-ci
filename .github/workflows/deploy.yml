name: Docker Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # ЭТАП 1: Проверка кода (Lint)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ЭТАП 2: Сборка и отправка в Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app:v1.0.${{ github.run_number }}

  # ЭТАП 3: Деплой в Kubernetes (теперь по-настоящему!)
  # ЭТАП 3: Деплой в Kubernetes (через Helm)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Даем права на запись в репозиторий для GITHUB_TOKEN
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Используем встроенный токен, он обновит репозиторий
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          # Ищем строку "tag: ..." и меняем её на актуальную версию билда
          # [skip ci] в коммите ниже не даст запустить воркфлоу по кругу
          sed -i "s/tag: .*/tag: v1.0.${{ github.run_number }}/" ./deploy/helm/my-app/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./deploy/helm/my-app/values.yaml
          # Добавляем [skip ci], чтобы GitHub не запускал этот же экшен снова после пуша
          git commit -m "chore: update image tag to v1.0.${{ github.run_number }} [skip ci]"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [lint, build-and-push, deploy]
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 **CI/CD Pipeline Report**
            -------------------------
            ✅ **Lint**: ${{ needs.lint.result }}
            📦 **Build**: ${{ needs.build-and-push.result }}
            ☸️ **Deploy**: ${{ needs.deploy.result }}

            👤 **Author**: ${{ github.actor }}
            📝 **Commit**: ${{ github.event.head_commit.message }}
            🔗 [View Workflow](https://github.com{{ github.repository }}/actions)
