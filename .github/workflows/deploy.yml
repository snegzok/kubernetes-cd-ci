name: Docker Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # ЭТАП 1: Проверка кода (Lint)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install linter
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ЭТАП 2: Сборка и отправка в Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app:v1.0.${{ github.run_number }}

  # ЭТАП 3: Деплой в Kubernetes (теперь по-настоящему!)
  # ЭТАП 3: Деплой в Kubernetes (через Helm)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Экшен сам настроит доступ, файл создавать не нужно
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      # 2. Helm сразу будет работать, так как контекст уже установлен
      - name: Deploy with Helm
        run: |
          helm upgrade --install my-app ./charts \
            --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/my-app \
            --set image.tag=v1.0.${{ github.run_number }} \
            --wait --timeout 5m
  notify:
    runs-on: ubuntu-latest
    needs: [lint, build-and-push, deploy]
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 **CI/CD Pipeline Report**
            -------------------------
            ✅ **Lint**: ${{ needs.lint.result }}
            📦 **Build**: ${{ needs.build-and-push.result }}
            ☸️ **Deploy**: ${{ needs.deploy.result }}

            👤 **Author**: ${{ github.actor }}
            📝 **Commit**: ${{ github.event.head_commit.message }}
            🔗 [View Workflow](https://github.com{{ github.repository }}/actions)
