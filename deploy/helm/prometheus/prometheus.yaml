apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 69.7.1  # Актуальная версия на апрель 2026
    chart: kube-prometheus-stack
    helm:
      values: |
        # Мы НЕ ставим еще одну Графану, у нас уже есть своя из библиотеки!
        grafana:
          enabled: false

        alertmanager:
          enabled: true
          alertmanagerSpec:
            # 1. МОНТИРУЕМ СЕКРЕТ (который создал SealedSecret)
            secrets:
              - alertmanager-tg-token

          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'telegram'
            receivers:
            - name: 'telegram'
              telegram_configs:
              - bot_token_file: '/etc/alertmanager/secrets/alertmanager-tg-token/token'
                chat_id: 7002594285  # Замени на свой ID (число)
                send_resolved: true
                parse_mode: 'HTML'
                message: |
                  {{ range .Alerts }}
                  <b>🔥 ALERT: {{ .Labels.alertname }}</b>
                  📌 Приложение: {{ .Labels.app }}
                  📝 Суть: {{ .Annotations.summary }}
                  ⏳ Началось: {{ .StartsAt.Format "15:04:05" }}
                  {{ end }}

        prometheus:
          prometheusSpec:
            retention: 6h
            storageSpec:
              emptyDir:
                medium: Memory
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

