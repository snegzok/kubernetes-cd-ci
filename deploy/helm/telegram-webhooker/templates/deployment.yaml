apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: webhooker
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - sh
          - -c
          - |
            # Создаём директорию
            mkdir -p /app
            
            cat <<'EOF' > /app/server.py
            from flask import Flask, request
            import requests
            import os
            import json
            import logging

            app = Flask(__name__)
            logging.basicConfig(level=logging.INFO)

            BOT_TOKEN = os.environ.get('BOT_TOKEN')
            CHAT_ID = os.environ.get('CHAT_ID')
            TELEGRAM_URL = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"

            @app.route('/health', methods=['GET'])
            def health():
                return 'OK', 200

            @app.route('/alert', methods=['POST'])
            def alert():
                try:
                    data = request.json
                    app.logger.info(f"Received alert: {json.dumps(data)[:500]}")

                    title = data.get('title', 'Alert')
                    message = data.get('message', 'No message')
                    status = data.get('status', 'firing')
                    emoji = "🔥" if status == "firing" else "✅"

                    text = f"{emoji} *{title}*\n\n📝 {message}"

                    payload = {
                        'chat_id': CHAT_ID,
                        'text': text,
                        'parse_mode': 'Markdown'
                    }
                    response = requests.post(TELEGRAM_URL, json=payload, timeout=10)
                    app.logger.info(f"Telegram response: {response.status_code}")

                    return 'OK', 200
                except Exception as e:
                    app.logger.error(f"Error: {e}")
                    return 'Error', 500

            if __name__ == '__main__':
                app.run(host='0.0.0.0', port=8080)
            EOF
            
            pip install flask requests -q
            python /app/server.py
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: alertmanager-tg-token
              key: token
        - name: CHAT_ID
          value: "7002594285"
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
