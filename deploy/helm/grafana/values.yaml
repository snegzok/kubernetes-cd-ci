# 1. Образ
image:
  repository: grafana/grafana
  tag: latest
  pullPolicy: IfNotPresent

# 2. Копии
replicaCount: 1

# 3. Порты (Grafana по умолчанию на 3000)
service:
  targetPort: 3000

# 4. Сеть (Твой домен)
ingress:
  host: grafana.expert-only.ru

# 5. Динамические диски (Grafana НУЖНО писать в эти папки)
persistence:
  enabled: true
  type: pvc
  size: 5Gi
  accessModes:
    - ReadWriteOnce
  # storageClassName: "default" # Раскомментируйте, если нужен конкретный класс

# 4. Исправление прав доступа (Init-контейнер)
# ЭТО РЕШАЕТ ОШИБКУ "is not writable"
initChownData:
  enabled: true

# 5. Безопасность (Security Context)
# Настройки для Пода (права на монтирование диска)
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Настройки для Контейнера (разрешаем запись в /var/lib/grafana)
containerSecurityContext:
  readOnlyRootFilesystem: false  # ИСПРАВЛЕНО: теперь Grafana сможет писать в БД
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# 6. Ресурсы (Класс Guaranteed для продакшена)
resources:
  requests:
    cpu: 250m
    memory: 750Mi
  limits:
    cpu: 250m
    memory: 750Mi

# 7. Переменные окружения и Секреты
envFrom:
  - secretRef:
      name: proxy-credentials

# Пути данных (оставляем дефолтными, чарт сам их свяжет с PVC)
env:
  - name: GF_PATHS_DATA
    value: /var/lib/grafana
  - name: GF_PATHS_LOGS
    value: /var/log/grafana
