apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false

          # Общие настройки для всех компонентов (самый высокий приоритет)
          commonConfig:
            replication_factor: 1
            storage:
              s3:
                endpoint: loki-prod-minio.logging.svc.cluster.local:9000
                insecure: true
                s3ForcePathStyle: true
                existingSecret: loki-minio-secret
                accessKeyIdKey: rootUser
                secretAccessKeyKey: rootPassword

          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: index_
                  period: 24h

          storage:
            type: s3
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin

          # Явный проброс переменных, чтобы перебить дефолтные "enterprise-logs"
          write:
            replicas: 1
            extraEnv:
              - name: S3_STORAGE_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: loki-minio-secret
                    key: rootUser
              - name: S3_STORAGE_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: loki-minio-secret
                    key: rootPassword
            resources:
              limits:
                memory: 512Mi

          backend:
            replicas: 1
            extraEnv:
              - name: S3_STORAGE_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: loki-minio-secret
                    key: rootUser
              - name: S3_STORAGE_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: loki-minio-secret
                    key: rootPassword
            resources:
              limits:
                memory: 512Mi

          read:
            replicas: 1
            resources:
              limits:
                memory: 512Mi

          gateway:
            enabled: true
            resources:
              limits:
                memory: 128Mi

        # Настройки встроенного Minio (если используешь его из чарта)
        minio:
          enabled: true
          mode: standalone
          replicas: 1
          existingSecret: loki-minio-secret
          rootUserKey: rootUser
          rootPasswordKey: rootPassword
          persistence:
            enabled: true
            size: 5Gi
            storageClass: "local-path"

        resultsCache:
          enabled: false
        chunksCache:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
