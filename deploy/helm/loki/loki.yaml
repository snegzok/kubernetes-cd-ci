apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
          
          # КОНФИГ LOKI КАК МНОГОСТРОЧНАЯ СТРОКА
          config: |
            schema_config:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            storage_config:
              s3:
                endpoint: loki-minio.logging.svc:9000
                access_key_id: loki
                secret_access_key: supersecret
                s3forcepathstyle: true
                insecure: true
            ingester:
              chunk_idle_period: 15m
              chunk_retain_period: 30s
            querier:
              query_timeout: 60s
        
        # HELM ПАРАМЕТРЫ (реплики, ресурсы)
        ingester:
          replicas: 2
        querier:
          replicas: 2
        queryFrontend:
          replicas: 1
        distributor:
          replicas: 2
        compactor:
          replicas: 1
        
        # MINIO
        minio:
          enabled: true
          rootUser: loki
          rootPassword: supersecret
          persistence:
            enabled: true
            size: 20Gi
        
        # РЕСУРСЫ
        write:
          replicas: 2
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
        
        read:
          replicas: 2
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
        
        backend:
          replicas: 1
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
        
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
