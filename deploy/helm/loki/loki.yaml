apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false

          commonConfig:
            replication_factor: 2

          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: http://loki-minio.logging.svc.cluster.local:9000
              accessKeyId: loki
              secretAccessKey: supersecret
              s3ForcePathStyle: true
              insecure: true

          rulerConfig:
            storage:
              type: local

        # MinIO — развёртывается тем же чартом
        minio:
          enabled: true
          rootUser: loki
          rootPassword: supersecret
          buckets:
            - name: loki-chunks
              policy: none
              purge: false
            - name: loki-ruler
              policy: none
              purge: false
            - name: loki-admin
              policy: none
              purge: false
          persistence:
            enabled: true
            size: 20Gi
          resources:
            requests:
              memory: 256Mi
              cpu: 100m

        write:
          replicas: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 100m

        read:
          replicas: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 100m

        backend:
          replicas: 1
          resources:
            requests:
              memory: 256Mi
              cpu: 100m

        gateway:
          enabled: true
          replicas: 1

        # Отключаем компоненты single-binary (не нужны в SimpleScalable)
        singleBinary:
          replicas: 0

        # Отключаем self-monitoring чтобы не было зависимости от Prometheus/Grafana при первом деплое
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
