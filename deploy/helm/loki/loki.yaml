apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
            s3:
              # Упрощаем адрес до внутреннего
              endpoint: loki-prod-minio.logging.svc:9000
              accessKeyId: loki
              secretAccessKey: supersecret
              s3ForcePathStyle: true
              insecure: true

        # --- ЭКОНОМНЫЙ MINIO ---
        minio:
          enabled: true
          mode: standalone # ОДИН ПОД вместо четырех!
          replicas: 1
          rootUser: loki
          rootPassword: supersecret
          persistence:
            enabled: true
            size: 2Gi # Хватит для тестов
            storageClass: "local-path"
          resources:
            limits:
              memory: 256Mi # Жесткий потолок по памяти

        # --- ЭКОНОМНЫЙ LOKI (оставляем по 1 реплике) ---
        write:
          replicas: 1
          persistence:
            size: 1Gi # Уменьшаем WAL-диск
          resources:
            limits:
              memory: 512Mi
        read:
          replicas: 1
          resources:
            limits:
              memory: 512Mi
        backend:
          replicas: 1
          persistence:
            size: 1Gi
          resources:
            limits:
              memory: 512Mi

        gateway:
          enabled: true
          resources:
            limits:
              memory: 64Mi

        resultsCache:
          enabled: false
        chunksCache:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
