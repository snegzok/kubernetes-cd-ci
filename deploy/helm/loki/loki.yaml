apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
        
          # --- СХЕМА ХРАНИЛИЩА ---
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
        
          # --- ХРАНИЛИЩЕ (MinIO) ---
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: loki-minio.logging.svc:9000
              accessKeyId: loki
              secretAccessKey: supersecret
              s3ForcePathStyle: true
              insecure: true
        
          # --- РЕПЛИКИ ДЛЯ ОТКАЗОУСТОЙЧИВОСТИ ---
          ingester:
            replicas: 2
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app.kubernetes.io/component: ingester
                    topologyKey: kubernetes.io/hostname
          querier:
            replicas: 2
          queryFrontend:
            replicas: 1
          distributor:
            replicas: 2
          compactor:
            replicas: 1
        
          # --- ОТКЛЮЧАЕМ КЕШИ (экономия ресурсов) ---
          resultsCache:
            enabled: false
          chunksCache:
            enabled: false
        
        # --- MINIO С PVC ---
        minio:
          enabled: true
          rootUser: loki
          rootPassword: supersecret
          persistence:
            enabled: true
            size: 20Gi
            storageClass: ""  # использует стандартный StorageClass
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 200m
        
        # --- МОНИТОРИНГ (можно включить, если есть ресурсы) ---
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false
        
        # --- РЕСУРСЫ ДЛЯ КОМПОНЕНТОВ LOKI ---
        write:
          replicas: 2
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: write
                  topologyKey: kubernetes.io/hostname
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
        
        read:
          replicas: 2
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: read
                  topologyKey: kubernetes.io/hostname
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
        
        backend:
          replicas: 1
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
