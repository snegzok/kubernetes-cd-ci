apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.2
    helm:
      values: |
        loki:
          deploymentMode: SimpleScalable
          auth_enabled: false
          
          # --- ВНУТРЕННЯЯ КОНФИГУРАЦИЯ LOKI ---
          config:
            schema_config:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            storage_config:
              s3:
                # Имя сервиса формируется как {metadata.name}-minio
                endpoint: loki-prod-minio.logging.svc:9000
                access_key_id: loki
                secret_access_key: supersecret
                s3forcepathstyle: true
                insecure: true

          # --- МАСШТАБИРОВАНИЕ КОМПОНЕНТОВ (ВНУТРИ LOKI) ---
          write:
            replicas: 2
            resources:
              requests:
                memory: 512Mi
                cpu: 200m
              limits:
                memory: 1Gi
                cpu: 500m
          read:
            replicas: 2
            resources:
              requests:
                memory: 512Mi
                cpu: 200m
              limits:
                memory: 1Gi
                cpu: 500m
          backend:
            replicas: 1
            resources:
              requests:
                memory: 512Mi
                cpu: 200m
              limits:
                memory: 1Gi
                cpu: 500m

        # --- ВНЕШНИЙ БЛОК MINIO ---
        minio:
          enabled: true
          rootUser: loki
          rootPassword: supersecret
          persistence:
            enabled: true
            size: 20Gi
            storageClass: "" 

        # --- МОНИТОРИНГ ---
        monitoring:
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
