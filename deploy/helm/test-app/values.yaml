# 1. Образ (используем безопасную версию nginx)
image:
  repository: nginxinc/nginx-unprivileged
  tag: stable
  pullPolicy: IfNotPresent

# 2. Копии
replicaCount: 1

# 3. Порты (этот образ по умолчанию слушает 8080)
service:
  targetPort: 8080

# 4. Сеть
ingress:
  host: test-nginx.expert-only.ru

# 5. Динамические диски (минимум, необходимый для этого образа)
persistence:
  volumes:
    - name: nginx-tmp
  mounts:
    - name: nginx-tmp
      mountPath: /tmp

# 6. Лимиты ресурсов
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# 7. Защита (библиотека подставит это в securityContext)
securityContext:
  readOnlyRootFilesystem: true
