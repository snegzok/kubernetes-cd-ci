apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-deployer
  namespace: default

---
# Описываем, ЧТО можно делать (Роль)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-deployer-role
  namespace: default
rules:
  - apiGroups: ["apps", "", "networking.k8s.io", "autoscaling"]
    resources: ["deployments", "services", "ingresses", "pods", "configmaps", "horizontalpodautoscalers", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Привязываем пользователя к роли ТОЛЬКО в этом неймспейсе (RoleBinding)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-deployer-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: github-deployer
  namespace: default
roleRef:
  kind: Role
  name: app-deployer-role
  apiGroup: rbac.authorization.k8s.io

---
# Создаем токен (пароль) для этого пользователя
apiVersion: v1
kind: Secret
metadata:
  name: github-deployer-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: github-deployer
type: kubernetes.io/service-account-token
